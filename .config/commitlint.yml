extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - chore
      - docs
      - refactor
      - test
      - perf
      - ci
      - build
  subject-case:
    - 2
    - never
    - - upper-case
      - pascal-case
      - start-case
