name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output
      render: shell
  - type: input
    id: service
    attributes:
      label: Service
      description: Which service is affected?
